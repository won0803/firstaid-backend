# [1] \uC11C\uBC84 \uD3EC\uD2B8 \uC124\uC815
server.port=8115

# [2] JSP \uBDF0 \uB9AC\uC878\uBC84 \uC124\uC815 (\uACBD\uB85C \uBC0F \uD655\uC7A5\uC790 \uC9C0\uC815)
spring.mvc.view.prefix=/WEB-INF/
spring.mvc.view.suffix=.jsp

# [3] MySQL \uB370\uC774\uD130\uBCA0\uC774\uC2A4 \uC5F0\uACB0 \uC124\uC815 (Log4jdbc + HikariCP \uBA85\uC2DC\uC801 \uBC14\uC778\uB529)
spring.datasource.driver-class-name=net.sf.log4jdbc.sql.jdbcapi.DriverSpy

# \u2605 \uC911\uC694: \uD788\uCE74\uB9AC \uCEE4\uB125\uC158 \uD480\uC774 \uC9C1\uC811 \uC77D\uC5B4\uAC08 \uC218 \uC788\uB3C4\uB85D jdbc-url\uB85C \uB2E8\uC77C\uD654\uD569\uB2C8\uB2E4.
spring.datasource.jdbc-url=jdbc:log4jdbc:mysql://localhost:3306/map?useSSL=false&allowPublicKeyRetrieval=true&useUnicode=true&serverTimezone=Asia/Seoul

# \u2605 \uCD94\uAC00: \uC2A4\uD504\uB9C1\uC774 DataSource \uD0C0\uC785\uC744 \uD788\uCE74\uB9AC\uB85C \uC815\uD655\uD788 \uC778\uC9C0\uD558\uB3C4\uB85D \uAC00\uC774\uB4DC\uD569\uB2C8\uB2E4.
spring.datasource.type=com.zaxxer.hikari.HikariDataSource

# DB \uC811\uC18D \uACC4\uC815 \uC815\uBCF4
spring.datasource.username=demo
spring.datasource.password=123456789123456789

# [4] JPA \uBC0F Hibernate \uC124\uC815
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# [5] \uAC1C\uBC1C \uD3B8\uC758\uC131 \uC124\uC815 (DevTools)
spring.devtools.livereload.enabled=true
spring.devtools.restart.enabled=true
server.servlet.jsp.init-parameters.development=true

# [6] \uB85C\uAE45 \uB808\uBCA8 \uC124\uC815 (MyBatis \uBC0F \uC2DC\uC2A4\uD15C \uB85C\uADF8)
logging.level.com.azurealstn.codespringweb.mapper=TRACE
logging.level.root=info

# [7] \uCD94\uAC00 \uC124\uC815 (\uD504\uB85C\uD30C\uC77C \uBC0F \uC138\uC158)
# real-db \uD504\uB85C\uD30C\uC77C\uC774 \uD65C\uC131\uD654\uB418\uBA74 \uC678\uBD80 \uC124\uC815\uC744 \uCC3E\uC73C\uBBC0\uB85C \uC8FC\uC11D \uCC98\uB9AC\uD558\uAC70\uB098 \uC720\uC9C0\uD569\uB2C8\uB2E4.
spring.profiles.include=real-db
spring.session.store-type=jdbc